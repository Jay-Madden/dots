name: Sync from Codeberg

on:
  schedule:
    # Run every 6 hours, offset from the submodule update to pick up its changes
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout GitHub mirror
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Pull from Codeberg and push to GitHub
      run: |
        git remote add codeberg https://codeberg.org/Jay-Madden/dots.git
        git fetch codeberg --prune
        git push origin refs/remotes/codeberg/*:refs/heads/* --force
